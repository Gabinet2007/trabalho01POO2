<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Estatístico</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@6/dist/echarts.min.js"></script>

<style>
body{
font-family:Arial;
margin:40px;
}

.chart{
width:900px;
height:400px;
margin-bottom:60px;
}
</style>

</head>

<body>

<h1>Dashboard Estatístico</h1>

<h2>Distribuição de Idades</h2>
<div id="idade" class="chart"></div>

<h2>Distribuição de Nomes</h2>
<div id="nome" class="chart"></div>

<h2>Pessoas por Cidade</h2>
<div id="cidade" class="chart"></div>

<h2>Pessoas por Profissão</h2>
<div id="profissao" class="chart"></div>

<h2>Distribuição Salarial</h2>
<div id="salario" class="chart"></div>

<h2>Distribuição de Altura</h2>
<div id="altura" class="chart"></div>

<h2>Distribuição de Peso</h2>
<div id="peso" class="chart"></div>

<h2>Classificação IMC</h2>
<div id="imc" class="chart"></div>

<script>

function barChart(id,titulo,dados){

var chart = echarts.init(document.getElementById(id));

var option = {
title:{text:titulo},
tooltip:{},
xAxis:{type:'category'},
yAxis:{type:'value'},
series:[{
type:'bar',
data:dados
}]
};

chart.setOption(option);
}

function pieChart(id,titulo,dados){

var chart = echarts.init(document.getElementById(id));

var option = {
title:{text:titulo},
tooltip:{},
series:[{
type:'pie',
radius:'60%',
data:dados
}]
};

chart.setOption(option);
}

barChart('idade','Distribuição de Idades',[['desvio',18.264014885834204],['mediana',49.0],['variancia',333.5742397499734],['media',48.9645],['moda',77.0],]);barChart('cidade','Pessoas por Cidade',[['Brasília',1008],['Curitiba',1054],['Joinville',1030],['São Paulo',987],['Porto Alegre',1032],['Blumenau',993],['Rio de Janeiro',1008],['Belo Horizonte',961],['Florianópolis',927],['Campinas',1000],]);barChart('profissao','Pessoas por Profissão',[['Professor',967],['Programador',972],['Designer',992],['Estudante',1026],['Advogado',1037],['Médico',1078],['Arquiteto',965],['Enfermeiro',999],['Analista',974],['Engenheiro',990],]);barChart('salario','Distribuição Salarial',[['desvio',4325.9015491519485],['mediana',8489.5],['variancia',1.871342421295523E7],['media',8443.6478],['moda',2290.0],]);barChart('altura','Distribuição de Altura',[['desvio',0.1452290707950676],['mediana',1.75],['variancia',0.02109148300399876],['media',1.748114],]);barChart('peso','Distribuição de Peso',[['desvio',17.235582541939518],['mediana',80.0],['variancia',297.0653055600103],['media',79.5538],]);pieChart('nome','Distribuição de Nomes',[{value:500,name:'Larissa'},{value:492,name:'Matheus'},{value:499,name:'Felipe'},{value:474,name:'Rafael'},{value:542,name:'Isabela'},{value:491,name:'Lucas'},{value:534,name:'Carolina'},{value:474,name:'Leticia'},{value:517,name:'Amanda'},{value:501,name:'Beatriz'},{value:497,name:'Julia'},{value:488,name:'Camila'},{value:503,name:'Bruno'},{value:500,name:'João'},{value:496,name:'Mariana'},{value:513,name:'Ana'},{value:504,name:'Marcos'},{value:507,name:'Pedro'},{value:503,name:'Gabriel'},{value:465,name:'Carlos'},]);pieChart('imc','Classificação IMC',[{value:7.380880497417435,name:'desvio'},{value:25.963047941069917,name:'mediana'},{value:54.47739691715704,name:'variancia'},{value:26.590120686991757,name:'media'},]);
</script>

</body>
</html>
